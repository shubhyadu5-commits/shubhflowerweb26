
 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>White Flowers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 20px;
      color: #333;
      line-height: 1.6;
    }
    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 20px;
    }
    ul {
      list-style-type: none;
      padding: 0;
    }
    figure {
      display: block;
      margin: 20px auto;
      max-width: 600px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    figure img {
      display: block;
      margin: 0 auto 10px auto;
      border-radius: 5px;
    }
    figcaption {
      font-weight: bold;
      color: #0066cc;
      text-align: center;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      text-align: justify;
      margin: 0 5px 10px 5px;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 15px 0;
    }
    footer {
      text-align: center;
      margin-top: 30px;
    }
    footer img {
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <h2>White Flowers :-</h2>
  <ul>
    <!-- Magnolia Jasmine -->
    <figure>
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Magnolia_grandiflora_-_flower_1.jpg/1280px-Magnolia_grandiflora_-_flower_1.jpg" alt="Magnolia Jasmine" height="150">
      <figcaption><em>Magnolia Jasmine</em></figcaption>
      <p>Magnolias are ancient flowering trees and shrubs, known for their large, fragrant blossoms. They symbolize endurance, beauty, and purity. “Magnolia Jasmine” often refers to a fragrance blend combining creamy floral notes with citrus and woody scents.</p>
      <hr>
    </figure>

    <!-- White Rose -->
    <figure>
      <img src="https://m.media-amazon.com/images/I/51a3Ivls2xL.jpg" alt="White Rose" height="150">
      <figcaption><em>White Rose</em></figcaption>
      <p>The white rose (Rosa × alba) is a symbol of purity, innocence, and new beginnings. Historically, it was the emblem of the House of York in England’s Wars of the Roses. It also represents reverence, courage, and is often used in weddings, memorials, and religious contexts.</p>
      <hr>
    </figure>

    <!-- White Lily -->
    <figure>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQsYQ93UpUtS6V0laAW76Td9tKFO7zL55lOlw&s" alt="White Lily" height="150">
      <figcaption><em>White Lily</em></figcaption>
      <p>White lilies symbolize purity, rebirth, and innocence. They are strongly associated with Easter and the resurrection of Jesus, making them common in religious ceremonies, weddings, baptisms, and funerals.</p>
      <hr>
    </figure>

    <!-- White Daisy -->
    <figure>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUT2jLYoIC9Lg65AVA5KhEUdJdWFm0-vznZg&s" alt="White Daisy" height="150">
      <figcaption><em>White Daisy</em></figcaption>
      <p>Daisies represent innocence, purity, and cheerful new beginnings. Their name comes from “day’s eye,” since they open with the sun. They are linked to folklore, childhood joy, and are often used in herbal remedies and playful traditions like daisy chains.</p>
      <hr>
    </figure>

    <!-- White Tulip -->
    <figure>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIB_F1Sw-zG_HL8vf8t0s28h9ml3dAeyERvw&s" alt="White Tulip" height="150">
      <figcaption><em>White Tulip</em></figcaption>
      <p>White tulips symbolize forgiveness, honor, and fresh starts. They are elegant spring flowers often chosen for weddings, apologies, or new beginnings. Varieties like ‘Purissima’ are especially prized for their beauty.</p>
      <hr>
    </figure>

    <!-- White Dahlia -->
    <figure>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTDkXsTPzkdduVSQWCafEKVxvrgm3eCC4YjbA&s" alt="White Dahlia" height="150">
      <figcaption><em>White Dahlia</em></figcaption>
      <p>Dahlias are striking blooms that symbolize purity, innocence, and new beginnings. White dahlias are popular in weddings and life celebrations due to their refined elegance and positive meanings.</p>
      <hr>
    </figure>

    <!-- White Orchid -->
    <figure>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSo3QE-g9RHNY8_Gx16Xdt1HQoVqDqR97Xt2A&s" alt="White Orchid" height="150">
      <figcaption><em>White Orchid</em></figcaption>
      <p>Orchids symbolize remembrance, peace, sympathy, and respect. White orchids, in particular, are often chosen for memorials and funerals, expressing calmness and empathy for those who have lost loved ones.</p>
      <hr>
    </figure>

    <!-- White Frangipani -->
    <figure>
      <img src="https://png.pngtree.com/thumb_back/fh260/background/20240718/pngtree-white-frangipani-flower-isolated-on-white-background-image_15888532.jpg" alt="White Frangipani" height="150">
      <figcaption><em>White Frangipani (Champa)</em></figcaption>
      <p>Known as Champa in India, frangipani (Plumeria) is a fragrant temple flower with deep religious significance. It has different names across Indian languages (Kath Golap in Bengali, Deva Ganneru in Telugu, Kaadu Sampige in Kannada) and is widely used in rituals and offerings</p>
      <hr>
    </figure>
  </ul>
