      font-family: Arial, sans-serif;

    }

      margin: 20px auto;

      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);

    figure img {
      display: block;
      margin: 0 auto 10px auto;

    }

    figcaption {
      font-weight: bold;
      color: #0066cc;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      text-align: justify;
      margin: 0 5px 10px 5px;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 15px 0;
    }

    footer {
      text-align: center;
      margin-top: 30px;
    }

    footer img {
      margin: 0 10px;
    }
  </style>

<body>
  <h2>Black Flower:-</h2>
  <ul>
    <figure>

      <img src="https://m.media-amazon.com/images/I/51PvAAOoKML._AC_UF350,350_QL80_.jpg" alt="" height="150">
      <figcaption><em>black rose,</em></figcaption>
      <P>
        Black roses are rare, mysterious flowers that don’t occur naturally; they are usually very dark red or purple
        cultivars bred to appear black. They symbolize death, mourning, and farewell, but also transformation, rebirth,
        resistance, and deep passion.



      </P>
    </figure>
    <figure> <img src="https://c.ndtvimg.com/gws/ms/10-black-flowers-that-bloom-only-in-winter/assets/2.png" alt=""
        height="150">
      <figcaption><em>Lenten Rose. </em></figcaption>
      <P>
        The Lenten rose (Helleborus orientalis) is a hardy perennial flower that blooms in late winter to early spring,
        often around the Christian season of Lent, which gives it its name. Despite being called a “rose,” it belongs to
        the buttercup family and produces elegant, nodding blossoms in shades of white, pink, purple, or green,
        sometimes speckled or veined. Known for its resilience in cold weather, the Lenten rose symbolizes serenity,
        endurance, and renewal, making it a cherished plant in shaded gardens where it adds color and life at a time
        when few other flowers bloom

      </P>
    </figure>
    <figure> <img src="https://www.tnnursery.net/cdn/shop/articles/1abe1039914836d1ea6c49ae5ad82f89.webp?v=1766094366"
        alt="" height="150">
      <figcaption><em>Black Velvet' petunia</em></figcaption>
      <P>
        ‘Black Velvet’ petunia is a striking ornamental flower cultivar, famous for being the world’s first true black
        petunia. Introduced in 2010, it features velvety, deep-black petals that give it a dramatic, luxurious
        appearance unlike any other garden flower. Despite its dark color, the plant grows like other petunias—compact,
        bushy, and covered in blooms throughout the summer. It thrives in full sun, well-drained soil, and regular
        watering, making it a popular choice for containers, hanging baskets, and garden beds. Symbolically, the Black
        Velvet petunia represents mystery, elegance, and bold individuality, often used to create eye-catching contrasts
        in floral displays

      </P>
    </figure>
  </ul>
