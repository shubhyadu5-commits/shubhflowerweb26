<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Flowers</title>
    <footer> Blue flowers are a rare and captivating sight in any garden. They symbolize tranquility, serenity, and the unknown.</footer>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 20px;
      color: #333;
      line-height: 1.6;
    }

    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 20px;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    figure {
      display: block;
      margin: 20px auto;
      max-width: 600px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    figure img {
      display: block;
      margin: 0 auto 10px auto;
      border-radius: 5px;
    }

    figcaption {
      font-weight: bold;
      color: #0066cc;
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      text-align: justify;
      margin: 0 5px 10px 5px;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 15px 0;
    }

    footer {
      text-align: center;
      margin-top: 30px;
    }

    footer img {
      margin: 0 10px;
    }
  </style>
  </head>
<body>
    <h2>Blue Flowers</h2>
    <ul>
        <li>
            <figure>
                <img src="https://images.ctfassets.net/i3tkg7dt3kro/4smqqU4FhI3zIZDcFH5HTD/27aefd02cb883826ca2cc19a632ea79f/blue-delphinium.jpg?w=1920&fm=webp&q=70" alt="Blue Rose" height="150">
                <figcaption><em>Blue Delphiniums Delphinium</em></figcaption>
                <p>Delphiniums are a hardy perennial with soaring floral spires. They are popular for cottage-style gardens and make great cutting flowers!
                    It's commonly said that beautiful delphiniums are a symbol of joy. But, like with every flower, each colour has a slightly different meaning. In most cases, delphiniums have positive meanings. While blue delphiniums <b>symbolise dignity and respect</b>,<mark>pink are seen as a sign of affection and romance.</mark>
            </p>
            </figure>
        </li>
         <li>
            <figure>
                <img src="https://images.unsplash.com/photo-1471696035578-3d8c78d99684?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8Ymx1ZSUyMGh5ZHJhbmdlYXxlbnwwfHwwfHx8MA%3D%3D" alt="Blue Hydrangea" height="150">
                <figcaption><em>Blue Hydrangea</em></figcaption>
                <p>Hydrangeas are a popular garden plant known for their large, showy flower heads. The blue color of hydrangeas is often associated with feelings of calmness and serenity.
                    Blue hydrangeas primarily symbolize <b>apology, forgiveness, and heartfelt emotion</b>, representing a desire for understanding and mending relationships, but can also signify tranquility, serenity, and even frigidity or regret, with meanings shifting by culture and context. They are often given to express regret or show you care,<mark> especially in Japanese tradition where they signify gratitude and apology</mark>, stemming from an emperor's regret. 
                </p>
            </figure>
            <li>
                <figure>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPx_63zk9cDgzUa_BGQ0Usx93W9VuL422zqg&s" alt="Blue Orchid" height="150">
                    <figcaption><em>blue orchids</em></figcaption>
                    <p>
                        Most blue orchids sold in stores, typically dyed Phalaenopsis, are not naturally blue; they are created by injecting blue dye into white orchid stems, meaning subsequent blooms will be white. True, naturally occurring blue orchids do exist, such as the Vanda coerulea or Cyanicula species, which represent rarity and serenity.
                        Blue orchids <mark>symbolize rarity, spirituality, and unique beauty.</mark>
                    </p>
            </figure>   
        </li>
    </ul>
</body>
