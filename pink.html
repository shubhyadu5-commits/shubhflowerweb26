<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>black</title>
      <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 20px;
      color: #333;
      line-height: 1.6;
    }
    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 20px;
    }
    ul {
      list-style-type: none;
      padding: 0;
    }
    figure {
      display: block;
      margin: 20px auto;
      max-width: 600px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    figure img {
      display: block;
      margin: 0 auto 10px auto;
      border-radius: 5px;
    }
    figcaption {
      font-weight: bold;
      color: #0066cc;
      text-align: center;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      text-align: justify;
      margin: 0 5px 10px 5px;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 15px 0;
    }
    footer {
      text-align: center;
      margin-top: 30px;
    }
    footer img {
      margin: 0 10px;
    }
  </style>
</head>
<body>
     <h2>Pink Flowers:-</h2>
     <ul>
  <figure><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSN36ZE9zoW0bUEG7CWNQttaEef4Doq8o82aQ&s" alt="" height="150">
<figcaption><em>Mexican aster</em></figcaption> 
<p>
    The Mexican aster (Cosmos bipinnatus) is a tall, daisy-like flower native to Mexico and the Americas, prized for its vibrant pink, purple, maroon, and white blooms that thrive in sunny gardens with minimal care. It’s commonly grown as an ornamental plant and symbolizes peace, modesty, and harmony
</p> 
</figure>
<figure>
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXqf8Yumdhl1xkd0_tWtfVia79RB-i5E4-CQ&s" alt="" height="150">
<figcaption><em> cherry blossom </em></figcaption>
<p>
    Cherry blossoms (sakura) are the delicate pink and white flowers of cherry trees, especially Prunus serrulata, and they symbolize the fleeting beauty of life, renewal, and the arrival of spring. They are deeply rooted in Japanese culture, inspiring art, poetry, and festivals for centuries
</p>

</figure>
<figure>
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZX77O3UWPhs-a2GT8Inqfhtn0RmPnlpGWCw&s" alt="" height="150">

<figcaption><em> bougainvillea</em></figcaption>
<p>
    Bougainvillea is a vibrant tropical plant known for its colorful papery bracts that surround small white flowers. Native to South America, it thrives in warm, sunny climates and symbolizes passion, resilience, and welcoming beauty.

</p></figure>
</ul>
</body>
